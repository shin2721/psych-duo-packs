<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=390, initial-scale=1">
<title>CourseWorldHero Mockup</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #040812; overflow: hidden; font-family: -apple-system, BlinkMacSystemFont, sans-serif; }

.device {
  width: 390px; height: 844px; margin: 0 auto;
  position: relative; overflow: hidden;
  background: linear-gradient(160deg, #040812 0%, #08102A 35%, #0C0824 65%, #060610 100%);
}

/* Color wash overlay */
.device::after {
  content: '';
  position: absolute; inset: 0;
  background: linear-gradient(to bottom, transparent 10%, #ec489918 35%, #A78BFA0C 55%, transparent 80%);
  pointer-events: none;
  animation: wash 8s ease-in-out infinite alternate;
}
@keyframes wash { from { opacity: 0; } to { opacity: 1; } }

/* Header */
.header {
  position: absolute; top: 60px; left: 24px; right: 24px;
  display: flex; justify-content: space-between; align-items: center;
  height: 44px; z-index: 20;
}
.unit-badge { display: flex; align-items: center; gap: 7px; }
.unit-dot {
  width: 9px; height: 9px; border-radius: 5px;
  background: #ec4899;
  box-shadow: 0 0 6px #ec489999;
}
.unit-text { color: rgba(255,255,255,0.50); font-size: 14px; font-weight: 600; letter-spacing: 0.3px; }
.prog-pill {
  background: rgba(255,255,255,0.06); border-radius: 10px;
  padding: 4px 10px;
}
.prog-text { color: rgba(255,255,255,0.38); font-size: 13px; font-weight: 700; letter-spacing: 0.5px; }

/* Ring zone */
.ring-zone {
  position: absolute;
  top: 50%; left: 50%;
  transform: translate(-50%, -60%);
  width: 220px; height: 220px;
}

/* Glow layers */
.glow-outer {
  position: absolute;
  width: 380px; height: 380px;
  left: 50%; top: 50%;
  transform: translate(-50%, -50%);
  border-radius: 50%;
  background: radial-gradient(circle,
    #ec489980 0%, #ec489947 20%, #A78BFA1A 45%, #A78BFA08 70%, transparent 100%);
  animation: breathGlow 4s ease-in-out infinite alternate;
}
@keyframes breathGlow { from { opacity: 0.5; } to { opacity: 1; } }

.glow-inner {
  position: absolute;
  width: 300px; height: 300px;
  left: 50%; top: 50%;
  transform: translate(-50%, -50%);
  border-radius: 50%;
  background: radial-gradient(circle,
    #ec48994D 0%, #ec489924 35%, #A78BFA0D 65%, transparent 100%);
}

/* Main ring SVG */
.ring-svg {
  position: absolute;
  left: 0; top: 0;
  width: 220px; height: 220px;
}

/* Icon */
.ring-icon {
  position: absolute;
  left: 0; top: 0; right: 0; bottom: 0;
  display: flex; align-items: center; justify-content: center;
  font-size: 48px; color: #ec4899EE;
  animation: breathIcon 3.2s ease-in-out infinite alternate;
}
@keyframes breathIcon { from { opacity: 0.85; } to { opacity: 1; } }

/* Info card */
.info-card {
  position: absolute;
  bottom: 120px; left: 20px; right: 20px;
  text-align: center;
  display: flex; flex-direction: column; align-items: center; gap: 10px;
}
.info-title {
  color: rgba(255,255,255,0.97); font-size: 26px; font-weight: 900;
  letter-spacing: -0.8px; line-height: 32px;
  text-shadow: 0 0 32px #ec489966;
}
.info-body {
  color: rgba(255,255,255,0.52); font-size: 14px; font-weight: 400;
  line-height: 20px; letter-spacing: 0.1px;
}
.meta-pill {
  display: inline-flex; align-items: center; gap: 5px;
  border: 1px solid #ec489920; border-radius: 999px;
  padding: 6px 14px;
}
.meta-text { color: #ec4899; font-size: 13px; font-weight: 700; letter-spacing: 0.3px; }
.meta-icon { color: #ec4899; font-size: 13px; }

/* Clock mode overlay */
.clock-overlay {
  display: none;
  position: absolute; inset: 0;
  z-index: 30;
}
.clock-overlay.active { display: block; }

.clock-center {
  position: absolute;
  top: 55%; left: 50%;
  transform: translate(-50%, -50%);
}

.clock-item {
  position: absolute;
  transform: translate(-50%, -50%);
  text-align: center;
}
.clock-ring {
  width: 130px; height: 130px;
  position: relative;
  display: flex; align-items: center; justify-content: center;
}
.clock-ring.top {
  width: 156px; height: 156px;
}
.clock-ring .glow-top {
  display: none;
}
.clock-ring.top .glow-top {
  display: block;
  position: absolute;
  width: 206px; height: 206px;
  left: 50%; top: 50%;
  transform: translate(-50%, -50%);
  border-radius: 50%;
  background: #ec4899;
  opacity: 0.15;
}
.clock-ring.top .glow-top-inner {
  display: block;
  position: absolute;
  width: 180px; height: 180px;
  left: 50%; top: 50%;
  transform: translate(-50%, -50%);
  border-radius: 50%;
  background: #ec4899;
  opacity: 0.25;
  z-index: 1;
}
.clock-ring svg { position: absolute; left: 0; top: 0; }
.clock-label {
  font-size: 15px; font-weight: 800; letter-spacing: -0.3px;
  margin-top: 2px;
}
.clock-icon {
  font-size: 36px;
}
.clock-ring.top .clock-icon { font-size: 43px; }
.clock-ring.top .clock-label { font-size: 18px; }

/* Mode toggle hint */
.hint {
  position: absolute; bottom: 40px; left: 0; right: 0;
  text-align: center; color: rgba(255,255,255,0.3);
  font-size: 12px;
}
</style>
</head>
<body>
<div class="device">
  <!-- Header -->
  <div class="header" id="header">
    <div class="unit-badge">
      <div class="unit-dot"></div>
      <span class="unit-text">メンタル</span>
    </div>
    <div class="prog-pill">
      <span class="prog-text">3 / 6</span>
    </div>
  </div>

  <!-- Hero ring (normal mode) -->
  <div class="ring-zone" id="heroRing">
    <div class="glow-outer"></div>
    <div class="glow-inner"></div>
    <svg class="ring-svg" viewBox="0 0 220 220">
      <defs>
        <linearGradient id="arc" x1="0" y1="0" x2="1" y2="1">
          <stop offset="0" stop-color="#ec4899" stop-opacity="1"/>
          <stop offset="0.5" stop-color="#A78BFA" stop-opacity="0.95"/>
          <stop offset="1" stop-color="#A78BFA" stop-opacity="0.75"/>
        </linearGradient>
        <radialGradient id="inner" cx="50%" cy="50%" r="50%">
          <stop offset="0" stop-color="#ec4899" stop-opacity="0.14"/>
          <stop offset="0.5" stop-color="#ec4899" stop-opacity="0.05"/>
          <stop offset="1" stop-color="#ec4899" stop-opacity="0"/>
        </radialGradient>
      </defs>
      <circle cx="110" cy="110" r="85" fill="url(#inner)"/>
      <circle cx="110" cy="110" r="95" fill="none" stroke="rgba(60,75,120,0.12)" stroke-width="10"/>
      <circle cx="110" cy="110" r="95" fill="none"
        stroke="url(#arc)" stroke-width="10" stroke-linecap="round"
        stroke-dasharray="597" stroke-dashoffset="239"
        transform="rotate(-90, 110, 110)"/>
    </svg>
    <div class="ring-icon">✦</div>
  </div>

  <!-- Info -->
  <div class="info-card" id="infoCard">
    <div class="info-title">L3</div>
    <div class="info-body">今の学習ルートの続きからそのまま始めましょう。</div>
    <div class="meta-pill">
      <span class="meta-icon">⚡</span>
      <span class="meta-text">レッスン 3 / 6</span>
    </div>
  </div>

  <!-- Clock mode -->
  <div class="clock-overlay" id="clockOverlay">
    <div class="clock-center" id="clockCenter"></div>
  </div>

  <div class="hint">長押しで回転モード（モックアップ: クリックで切替）</div>
</div>

<script>
const THEME = '#ec4899';
const SYN = '#A78BFA';
const CLOCK_RADIUS = 160;
const lessons = [
  { id: 'L1', icon: '💬', label: 'L1', status: 'done' },
  { id: 'L2', icon: '💡', label: 'L2', status: 'done' },
  { id: 'L3', icon: '✦', label: 'L3', status: 'current' },
  { id: 'L4', icon: '🔍', label: 'L4', status: 'locked' },
  { id: 'L5', icon: '👣', label: 'L5', status: 'locked' },
  { id: 'L6', icon: '🏆', label: 'L6', status: 'locked' },
];
let currentIdx = 2;
let clockActive = false;

function renderClock() {
  const center = document.getElementById('clockCenter');
  center.innerHTML = '';
  const N = lessons.length;
  const apl = (2 * Math.PI) / N;

  lessons.forEach((les, i) => {
    const angle = -Math.PI / 2 + (i - currentIdx) * apl;
    const x = Math.cos(angle) * CLOCK_RADIUS;
    const y = Math.sin(angle) * CLOCK_RADIUS;
    const isTop = i === currentIdx;
    const size = isTop ? 156 : 130;
    const r = size / 2 - 6;
    const circ = 2 * Math.PI * r;
    const stroke = isTop ? 6 : 4;

    const ringColor = isTop ? THEME
      : les.status === 'done' ? SYN
      : les.status === 'locked' ? 'rgba(60,75,120,0.35)' : THEME + '77';
    const iconColor = isTop ? '#FFFFFF'
      : les.status === 'done' ? SYN + 'CC'
      : les.status === 'locked' ? 'rgba(60,75,120,0.5)' : THEME + 'AA';

    const div = document.createElement('div');
    div.className = 'clock-item';
    div.style.left = x + 'px';
    div.style.top = y + 'px';
    div.style.zIndex = isTop ? 10 : 1;

    div.innerHTML = `
      <div class="clock-ring ${isTop ? 'top' : ''}">
        <div class="glow-top"></div>
        ${isTop ? '<div class="glow-top-inner"></div>' : ''}
        <svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}">
          <circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none"
            stroke="${isTop ? THEME+'30' : 'rgba(60,75,120,0.12)'}" stroke-width="${stroke}"/>
          ${isTop ? `<circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none"
            stroke="${THEME}" stroke-width="${stroke}" stroke-linecap="round"
            stroke-dasharray="${circ}" opacity="0.9"/>` : ''}
          ${!isTop && (les.status === 'done' || les.status === 'current') ? `<circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none"
            stroke="${ringColor}" stroke-width="${stroke}" stroke-linecap="round"
            stroke-dasharray="${circ}" stroke-dashoffset="${les.status === 'done' ? 0 : circ * 0.5}"
            transform="rotate(-90, ${size/2}, ${size/2})" opacity="0.5"/>` : ''}
        </svg>
        <div style="position:absolute;display:flex;flex-direction:column;align-items:center;justify-content:center;inset:0;">
          <span class="clock-icon" style="color:${iconColor}">${les.icon}</span>
          <span class="clock-label" style="color:${iconColor}">${les.label}</span>
        </div>
      </div>
    `;
    center.appendChild(div);
  });
}

// Toggle clock mode on click
document.querySelector('.device').addEventListener('click', () => {
  clockActive = !clockActive;
  document.getElementById('clockOverlay').classList.toggle('active', clockActive);
  document.getElementById('heroRing').style.display = clockActive ? 'none' : '';
  document.getElementById('infoCard').style.display = clockActive ? 'none' : '';
  document.getElementById('header').style.display = clockActive ? 'none' : '';
  if (clockActive) renderClock();
});

renderClock();
</script>
</body>
</html>
