<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=414, initial-scale=1">
<title>Psycle Trail — Dark Space</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');

:root {
  --bg: #0b1220;
  --surface: #0f172a;
  --card: #111c31;
  --text: #e5e7eb;
  --sub: #b0b8c4;
  --line: #2d3e5f;
  --accent: #22d3ee;
  --success: #22c55e;
  --glow: #a8ff60;
  --glow-bright: #eaff00;
  --primary: #3b82f6;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: #060c18;
  font-family: 'Inter', -apple-system, sans-serif;
  color: var(--text);
  display: flex;
  justify-content: center;
  align-items: flex-start;
  min-height: 100vh;
  padding: 32px 16px;
  -webkit-font-smoothing: antialiased;
}

/* ═══ Device ═══ */
.device {
  width: 393px;
  height: 852px;
  background: var(--bg);
  border-radius: 48px;
  overflow: hidden;
  position: relative;
  box-shadow:
    0 0 0 1px rgba(255,255,255,0.05),
    0 20px 60px -15px rgba(0,0,0,0.6);
}
.scroll {
  width: 100%;
  height: 100%;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
}
.scroll::-webkit-scrollbar { display: none; }

/* ═══ Stars background ═══ */
.stars {
  position: absolute;
  inset: 0;
  z-index: 0;
  overflow: hidden;
}
.star {
  position: absolute;
  width: 2px;
  height: 2px;
  background: #fff;
  border-radius: 50%;
  animation: twinkle var(--dur, 3s) ease-in-out infinite;
  opacity: 0;
}
@keyframes twinkle {
  0%, 100% { opacity: 0.1; }
  50% { opacity: var(--peak, 0.6); }
}

/* Shooting star */
.shooting-star {
  position: absolute;
  width: 80px;
  height: 1px;
  background: linear-gradient(90deg, rgba(168,255,96,0.6), transparent);
  transform: rotate(-35deg);
  animation: shoot 6s ease-in infinite;
  opacity: 0;
}
@keyframes shoot {
  0% { opacity: 0; transform: rotate(-35deg) translateX(-100px); }
  5% { opacity: 1; }
  15% { opacity: 0; transform: rotate(-35deg) translateX(400px); }
  100% { opacity: 0; }
}

/* Firefly */
.firefly {
  position: absolute;
  width: 4px;
  height: 4px;
  border-radius: 50%;
  background: var(--glow-bright);
  box-shadow: 0 0 8px 2px rgba(234,255,0,0.4);
  animation: float var(--dur, 4s) ease-in-out infinite;
  opacity: 0;
}
@keyframes float {
  0%, 100% { opacity: 0; transform: translate(0, 0); }
  25% { opacity: 0.8; transform: translate(var(--dx, 10px), var(--dy, -15px)); }
  50% { opacity: 0.4; transform: translate(calc(var(--dx, 10px) * -0.5), calc(var(--dy, -15px) * 1.5)); }
  75% { opacity: 0.7; transform: translate(calc(var(--dx, 10px) * 0.8), calc(var(--dy, -15px) * 0.3)); }
}

/* ═══ Island ═══ */
.island { display: flex; justify-content: center; padding-top: 12px; position: sticky; top: 0; z-index: 100; }
.island-pill { width: 126px; height: 36px; background: #000; border-radius: 20px; }

/* ═══ Status ═══ */
.status {
  display: flex; justify-content: space-between; align-items: center;
  padding: 4px 30px 0; font-size: 12px; font-weight: 600; color: var(--sub);
}

/* ═══ Top bar ═══ */
.top-bar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 16px 24px 0;
  position: relative;
  z-index: 10;
}
.genre-label {
  font-size: 18px;
  font-weight: 800;
  color: var(--text);
  letter-spacing: -0.02em;
}
.streak-pill {
  display: flex;
  align-items: center;
  gap: 4px;
  padding: 4px 10px;
  border-radius: 12px;
  background: rgba(234,255,0,0.08);
  border: 1px solid rgba(234,255,0,0.15);
  font-size: 12px;
  font-weight: 700;
  color: var(--glow-bright);
}

/* ═══ Progress ring (mini) ═══ */
.progress-mini {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 12px 24px 0;
  position: relative;
  z-index: 10;
}
.progress-ring {
  width: 36px;
  height: 36px;
  position: relative;
}
.progress-ring svg {
  transform: rotate(-90deg);
}
.progress-ring .ring-bg {
  fill: none;
  stroke: var(--line);
  stroke-width: 3;
}
.progress-ring .ring-fill {
  fill: none;
  stroke: var(--glow);
  stroke-width: 3;
  stroke-linecap: round;
  stroke-dasharray: 94.25;
  stroke-dashoffset: calc(94.25 * (1 - var(--pct, 0.43)));
  filter: drop-shadow(0 0 4px rgba(168,255,96,0.4));
}
.progress-text {
  font-size: 13px;
  color: var(--sub);
  font-weight: 500;
}
.progress-text strong {
  color: var(--text);
  font-weight: 700;
}

/* ═══ Trail container ═══ */
.trail-wrap {
  position: relative;
  z-index: 5;
  padding: 32px 0 60px;
  min-height: 600px;
}

/* SVG path */
.trail-svg {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  z-index: 1;
  pointer-events: none;
}

/* ═══ Node ═══ */
.node {
  position: absolute;
  z-index: 10;
  display: flex;
  flex-direction: column;
  align-items: center;
  cursor: pointer;
  transition: transform 0.2s;
}
.node:hover { transform: scale(1.05); }

.n-orb {
  width: 56px;
  height: 56px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
  transition: all 0.3s;
}

.n-icon {
  font-size: 22px;
  line-height: 1;
}

.n-level {
  font-size: 10px;
  font-weight: 700;
  margin-top: 4px;
  opacity: 0.5;
  color: var(--sub);
}

/* ── Done ── */
.node.done .n-orb {
  background: rgba(34,197,94,0.12);
  border: 2px solid rgba(34,197,94,0.4);
  box-shadow: 0 0 12px rgba(34,197,94,0.15);
}
.node.done .n-icon { opacity: 0.6; }
.node.done .n-level { color: var(--success); opacity: 0.6; }

.done-check {
  position: absolute;
  bottom: -2px;
  right: -2px;
  width: 18px;
  height: 18px;
  background: var(--success);
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 10px;
  color: #fff;
  font-weight: 900;
  border: 2px solid var(--bg);
  z-index: 2;
}

/* ── Current ── */
.node.current .n-orb {
  width: 68px;
  height: 68px;
  background: radial-gradient(circle, rgba(168,255,96,0.25) 0%, rgba(34,211,238,0.15) 60%, transparent 100%);
  border: 2.5px solid var(--glow);
  box-shadow:
    0 0 20px rgba(168,255,96,0.3),
    0 0 40px rgba(168,255,96,0.1),
    inset 0 0 15px rgba(168,255,96,0.05);
  animation: node-pulse 2s ease-in-out infinite;
}
.node.current .n-icon { font-size: 28px; }
.node.current .n-level { display: none; }

@keyframes node-pulse {
  0%, 100% {
    box-shadow:
      0 0 20px rgba(168,255,96,0.3),
      0 0 40px rgba(168,255,96,0.1),
      inset 0 0 15px rgba(168,255,96,0.05);
    transform: scale(1);
  }
  50% {
    box-shadow:
      0 0 30px rgba(168,255,96,0.4),
      0 0 60px rgba(168,255,96,0.15),
      inset 0 0 20px rgba(168,255,96,0.08);
    transform: scale(1.06);
  }
}

/* Current: play button below */
.play-btn {
  margin-top: 8px;
  padding: 6px 16px;
  border-radius: 14px;
  background: var(--glow);
  color: #0b1220;
  font-size: 12px;
  font-weight: 800;
  letter-spacing: 0.02em;
  box-shadow: 0 2px 12px rgba(168,255,96,0.3);
  animation: play-glow 2s ease-in-out infinite;
}
@keyframes play-glow {
  0%, 100% { box-shadow: 0 2px 12px rgba(168,255,96,0.3); }
  50% { box-shadow: 0 4px 20px rgba(168,255,96,0.5); }
}

/* ── Locked ── */
.node.locked .n-orb {
  width: 48px;
  height: 48px;
  background: rgba(45,62,95,0.3);
  border: 1.5px solid rgba(45,62,95,0.5);
}
.node.locked .n-icon { opacity: 0.2; filter: saturate(0); }
.node.locked .n-level { opacity: 0.25; }

/* ── Special: game ── */
.node.game .n-orb {
  background: rgba(34,211,238,0.08);
  border: 1.5px solid rgba(34,211,238,0.25);
}
.node.game .n-icon { opacity: 0.3; }

/* ── Special: reward ── */
.node.reward .n-orb {
  background: rgba(234,255,0,0.06);
  border: 1.5px solid rgba(234,255,0,0.2);
}
.node.reward .n-icon { opacity: 0.3; }

/* ── Special: milestone ── */
.node.milestone .n-orb {
  width: 60px;
  height: 60px;
  background: rgba(59,130,246,0.08);
  border: 1.5px solid rgba(59,130,246,0.25);
}
.node.milestone .n-icon { opacity: 0.3; font-size: 24px; }

/* ═══ Mist layer ═══ */
.mist {
  position: absolute;
  width: 200%;
  height: 120px;
  background: linear-gradient(90deg, transparent, rgba(11,18,32,0.4), transparent);
  animation: drift 20s linear infinite;
  z-index: 3;
  pointer-events: none;
  opacity: 0.5;
}
@keyframes drift {
  0% { transform: translateX(-50%); }
  100% { transform: translateX(0%); }
}

/* ═══ Vignette ═══ */
.vignette-top {
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  height: 120px;
  background: linear-gradient(180deg, var(--bg), transparent);
  z-index: 50;
  pointer-events: none;
}
.vignette-bottom {
  position: absolute;
  bottom: 0;
  left: 0;
  right: 0;
  height: 100px;
  background: linear-gradient(0deg, var(--bg), transparent);
  z-index: 50;
  pointer-events: none;
}

/* ═══ Tab bar ═══ */
.tab-bar {
  position: absolute;
  bottom: 0;
  left: 0;
  right: 0;
  height: 80px;
  background: rgba(11,18,32,0.9);
  backdrop-filter: blur(10px);
  display: flex;
  justify-content: space-around;
  align-items: center;
  padding: 0 8px 16px;
  z-index: 100;
  border-top: 1px solid rgba(255,255,255,0.05);
}
.tab {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 3px;
  font-size: 10px;
  font-weight: 600;
  color: var(--sub);
  opacity: 0.5;
}
.tab.active {
  color: var(--text);
  opacity: 1;
}
.tab-icon {
  font-size: 20px;
  line-height: 1;
}
.tab.active .tab-icon {
  position: relative;
}
.tab-firefly {
  position: absolute;
  top: -2px;
  right: -4px;
  width: 5px;
  height: 5px;
  border-radius: 50%;
  background: var(--glow-bright);
  box-shadow: 0 0 6px 1px rgba(234,255,0,0.5);
  animation: tab-fly 2s ease-in-out infinite;
}
@keyframes tab-fly {
  0%, 100% { transform: translate(0, 0); }
  25% { transform: translate(2px, -3px); }
  75% { transform: translate(-2px, -1px); }
}
</style>
</head>
<body>

<div class="device">

  <!-- Stars -->

  <div class="vignette-top"></div>

  <div class="scroll">

        <path d="M 196 50 C 280 90, 300 140, 260 180 C 220 220, 140 230, 150 280"

  <!-- Tab bar -->
